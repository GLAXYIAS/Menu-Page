<!DOCTYPE html>
<html>
<head>
<style>
    .flavor-container {
        text-align: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
    }

    .flavor-image {
        /* This "resizes" the large image to a manageable size */
        width: 100%;
        max-width: 400px; 
        height: auto;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        display: block;
        margin: 20px auto;
    }

    h1 {
        color: #5d4037; /* A nice cocoa brown */
    }
</style>
</head>
<body>

    <div class="flavor-container">
        <h1>Our Delicious Flavors</h1>
        <p>Explore our seasonal favorites below!</p>

        <div id="ice-cream-display">
            <img 
                src="imgs/Hot-Cocoa-Snow-Ice-Cream-1200x1136-square.jpg" 
                alt="Hot Cocoa Snow Ice Cream" 
                class="flavor-image"
                onerror="this.src='https://via.placeholder.com/400x400/f2a900/111111?text=Flavor+Image+Missing';">
        </div>
    </div>

</body>
</html>
